name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x] # सिर्फ एक वर्जन रखो ताकि बिल्ड जल्दी हो

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        # हमने 'cache: npm' हटा दिया है क्योंकि तुम्हारे पास lock file नहीं है

    - name: Install dependencies
      run: npm install # 'npm ci' की जगह 'npm install' ताकि lock file की जरूरत न पड़े

    - name: Build the project
      run: npm run build --if-present

    - name: Run tests
      run: npm test --if-present
      
