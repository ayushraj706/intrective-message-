<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaseKey AI | Official Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; }
        .glow { box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }
        .gradient-text {
            background: linear-gradient(to right, #22c55e, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="text-center p-8 max-w-lg">
        <div class="mb-6 inline-flex p-4 bg-green-500/10 rounded-3xl border border-green-500/20 glow">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>

        <h1 class="text-5xl font-extrabold mb-4 tracking-tighter">
            Base<span class="gradient-text">Key</span> AI
        </h1>
        
        <p class="text-gray-400 text-lg mb-8">
            WhatsApp Business Automation aur AI Solutions ka official administrative pabal.
        </p>

        <div class="inline-flex items-center gap-2 px-4 py-2 bg-zinc-900 border border-zinc-800 rounded-full mb-10">
            <span class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
            </span>
            <span class="text-sm font-medium text-green-400">System Online: v1.0.0</span>
        </div>

        <div>
            <a href="/api/whatsapp" class="text-zinc-500 hover:text-white text-xs transition-colors underline underline-offset-4">
                API Endpoint Check
            </a>
        </div>
    </div>

</body>
</html>
